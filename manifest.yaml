schema_version: 3
kit:
  name: hermes-profile-kit
  version: 3.0.0
  license: MIT

upstream:                            # CI-managed; humans don't edit
  repo: https://github.com/NousResearch/hermes-agent
  pinned_commit: "5621fc44"
  pinned_version: "0.12.3"
  verified_at: "2026-05-15T09:49Z"

min_hermes_version: "0.12.0"

profiles:
  - name: coder
    template: profiles/coder
    role: Full-stack development assistant
    model_tier: sonnet
    channels: [cli]
    tokens:
      required:
        - { key: ANTHROPIC_API_KEY, provider: anthropic }
      optional: []
    recommended_plugins: []

  - name: assistant
    template: profiles/assistant
    role: Personal daily assistant
    model_tier: sonnet
    channels: [cli, telegram]
    tokens:
      required:
        - { key: ANTHROPIC_API_KEY, provider: anthropic }
      optional:
        - { key: TELEGRAM_BOT_TOKEN, provider: telegram, wizard: telegram_botfather }
    recommended_plugins:
      - { id: honcho-memory, default: true }

  - name: research
    template: profiles/research
    role: Deep research with web search and citations
    model_tier: opus
    channels: [cli]
    tokens:
      required:
        - { key: ANTHROPIC_API_KEY, provider: anthropic }
      optional:
        - { key: BRAVE_SEARCH_API_KEY, provider: brave }
        - { key: EXA_API_KEY, provider: exa }
    recommended_plugins:
      - { id: honcho-memory, default: true }
      - { id: brave-search-tool, default: true }

  - name: community-bot
    template: profiles/community-bot
    role: Korean dev community helper bot
    model_tier: haiku
    channels: [telegram, discord]
    tokens:
      required:
        - { key: ANTHROPIC_API_KEY, provider: anthropic }
      optional:
        - { key: TELEGRAM_BOT_TOKEN, provider: telegram, wizard: telegram_botfather }
        - { key: DISCORD_BOT_TOKEN,  provider: discord,  wizard: discord_devportal }
    recommended_plugins: []

  - name: seb
    template: profiles/seb
    role: Second-brain controller (Obsidian + NotebookLM via Slack)
    model_tier: openai-codex
    channels: [slack]
    tokens:
      required:
        - { key: SLACK_BOT_TOKEN,       provider: slack, wizard: slack_bot     }
        - { key: SLACK_SIGNING_SECRET,  provider: slack, wizard: slack_signing }
        - { key: SLACK_APP_TOKEN,       provider: slack, wizard: slack_app     }
      optional:
        # Only needed if you opt-in to the codex-openai-proxy plugin instead of Hermes's
        # native openai-codex provider. Defaults match the proxy's bundled values.
        - { key: OPENAI_BASE_URL, provider: openai-codex, wizard: codex_base_url, default: "http://localhost:8765/v1" }
        - { key: OPENAI_API_KEY,  provider: openai-codex, wizard: codex_api_key,  default: "sk-codex-proxy-local" }
        - { key: JINA_API_KEY,    provider: jina }
    recommended_plugins:
      # Deprecated default for 3.1.2+: Hermes ships a native openai-codex provider that talks
      # straight to chatgpt.com/backend-api/codex from your local Codex CLI OAuth session.
      # Enable this plugin only if you cannot use Hermes's native provider (e.g., shared host).
      - { id: codex-openai-proxy, default: false }

plugins:
  honcho-memory:
    description: "External long-term memory via Honcho (Plastic Labs). Default Hermes external memory provider."
    upstream_command: "hermes -p {profile} memory setup honcho"
    verified_in_upstream: true       # CI-managed
    docs: https://honcho.dev
  brave-search-tool:
    description: "Web search tool backed by Brave Search API"
    upstream_command: "hermes -p {profile} tools enable web_search"
    verified_in_upstream: true
    docs: https://brave.com/search/api/
  codex-openai-proxy:
    description: "Local OpenAI-compatible HTTP proxy routing /v1/chat/completions to the user's logged-in Codex CLI (gpt-5.5 / gpt-5.4-mini). No separate OpenAI billing key required."
    upstream_command: null
    install_path: scripts/codex-openai-proxy
    launchd_template: scripts/codex-openai-proxy/launchd.plist.example
    verified_in_upstream: false
    docs: scripts/codex-openai-proxy/README.md

preserve_existing:  [".env"]
overwrite_from_template: ["SOUL.md", "config.yaml"]
