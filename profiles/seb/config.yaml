# Hermes profile config — seb (Second Brain)
# Slack-only personal second-brain controller.
# Model: gpt-5.5 via Hermes's native openai-codex provider (uses local Codex CLI OAuth session).
# No proxy needed — the codex-openai-proxy plugin is opt-in for users without local Codex CLI.

model:
  default: gpt-5.5
  provider: openai-codex

auxiliary:
  default: gpt-5.4-mini
  provider: openai-codex

terminal:
  backend: local

tools:
  enabled:
    - file
    - shell
    - web_search
    - web_fetch
  disabled:
    - image_generation
    - voice
    - cron

gateway:
  approval_required:
    - delete
    - move
    - mass_message
    - send_message

concurrency:
  per_thread: 1
  per_profile: 3

rate_limit:
  per_user_per_hour: 60
  per_channel_per_hour: 120

memory:
  built_in:
    nudge_interval_turns: 20
    max_facts: 300

display:
  tool_preview_length: 100
